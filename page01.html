            <div class="collapse navbar-collapse" id="navbarCollapse">

                    <h1 class="reading-title">Пролог</h1>

            </div>

        <section class="reading-section">

    <!--Basic scripts-->
    <script src="./bootstrap.bundle.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/yesiamrocks/cssanimation.io@1.0.3/letteranimation.min.js"></script>
    <script src="https://kit.fontawesome.com/97eb1c096b.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wow/1.1.2/wow.min.js"></script>
    <script src="https://unpkg.com/flickity@2/dist/flickity.pkgd.min.js"></script>

    <script>
        function windowScroll() {
            const navbar = document.getElementById("navbar");
            if (
                document.body.scrollTop >= 50 ||
                document.documentElement.scrollTop >= 50
            ) {
                navbar.classList.add("nav-sticky");
            } else {
                navbar.classList.remove("nav-sticky");
            }
        }
            
        window.addEventListener('scroll', (ev) => {
            ev.preventDefault();
            windowScroll();
        })
    </script>
    
    <!--Script enabling animation-->
    <script>
        new WOW().init();   
    </script>
</body>
